# Sanuvia AI — nginx reverse proxy for buyafraction.com
# Put in /etc/nginx/sites-available/ and symlink into sites-enabled/.
# certbot --nginx will inject the SSL cert lines into the 443 block.

# ---- HTTP: ACME challenge + redirect everything to HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name buyafraction.com www.buyafraction.com;

    # Let's Encrypt webroot challenges
    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / { return 301 https://$host$request_uri; }
}

# ---- HTTPS: proxy to the uvicorn app on 127.0.0.1:8000 ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name buyafraction.com www.buyafraction.com;

    # certbot fills these in (or point them at your cert):
    ssl_certificate     /etc/letsencrypt/live/buyafraction.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/buyafraction.com/privkey.pem;

    # allow large audio uploads (file-transcription)
    client_max_body_size 200m;

    # OPTIONAL: protect the whole site with a password (recommended — the app has
    # no auth and stores voiceprints). Create the file with:
    #   sudo apt install apache2-utils && sudo htpasswd -c /etc/nginx/.sanuvia_htpasswd you
    # then uncomment:
    # auth_basic "Sanuvia AI";
    # auth_basic_user_file /etc/nginx/.sanuvia_htpasswd;

    # ---- live streaming WebSocket ----
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;      # keep long live sessions open
        proxy_send_timeout 3600s;
        proxy_buffering off;           # stream events immediately
    }

    # ---- everything else (REST API, streamed file upload, static UI) ----
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;       # long uploads / CPU transcription
        proxy_buffering off;           # NDJSON upload progress streams live
    }
}
