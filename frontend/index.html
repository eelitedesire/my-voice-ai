<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sanuvia AI — Speaker Intelligence</title>
  <link rel="icon" type="image/png" href="/images/favicon.png" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="nav">
    <a class="brand" href="/"><img src="/images/logo.png" alt="Sanuvia AI" class="brand-logo" /></a>
    <nav class="nav-links">
      <a href="/" class="active">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="nav-label">Home</span>
      </a>
      <a href="/enroll.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        <span class="nav-label">Enroll</span>
      </a>
      <a href="/live.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 0 1 0 8.49"/><path d="M7.76 7.76a6 6 0 0 0 0 8.49"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
        <span class="nav-label">Live Session</span>
      </a>
    </nav>
    <span class="nav-spacer"></span>
    <span class="nav-status"><span class="pulse"></span> System online</span>
    <button class="theme-toggle" id="themeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">
      <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
  </header>
  <script>
    (function(){
      const t = localStorage.getItem('theme');
      if(t) document.documentElement.setAttribute('data-theme', t);
      document.addEventListener('DOMContentLoaded', function(){
        const btn = document.getElementById('themeToggle');
        btn.addEventListener('click', function(){
          const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
          const next = isDark ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('theme', next);
        });
      });
    })();
  </script>

  <div class="container">
    <section class="hero">
      <h1>Welcome to <span class="gradient-text">Sanuvia AI</span></h1>
      <p class="lead">Enroll speakers, then transcribe live or from a file — every turn attributed to the right person.</p>
      <div class="cta">
        <a href="/live.html"><button>▶ Start live session</button></a>
        <a href="/enroll.html"><button class="secondary">Enroll a speaker</button></a>
      </div>
      <div class="stats">
        <div class="stat"><div class="n" id="statSpeakers">—</div><div class="l">Enrolled speakers</div></div>
        <div class="stat"><div class="n">Live</div><div class="l">Streaming transcription</div></div>
        <div class="stat"><div class="n">4</div><div class="l">Export formats</div></div>
      </div>
    </section>

    <div class="card">
      <div class="toolbar">
        <h2>Enrolled speakers</h2>
        <span class="grow"></span>
        <a href="/enroll.html"><button class="secondary sm">Manage</button></a>
      </div>
      <ul class="speaker-list" id="speakers"></ul>
    </div>
  </div>

  <script type="module">
    const $ = (id) => document.getElementById(id);
    const COLORS = ['#059669','#d97706','#e11d48','#0d9488','#db2777','#ca8a04','#be185d','#15803d'];
    try {
      const { speakers } = await (await fetch('/api/speakers')).json();
      $('statSpeakers').textContent = speakers.length;
      const ul = $('speakers');
      if (!speakers.length) { ul.innerHTML = '<div class="empty-state"><div class="e-icon">👤</div><p>No speakers enrolled yet.</p></div>'; }
      else {
        ul.innerHTML = '';
        speakers.forEach((s, i) => {
          const col = COLORS[i % COLORS.length];
          const initials = s.name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
          const li = document.createElement('li');
          li.innerHTML = `<div class="spk-info"><div class="spk-avatar" style="background:${col}">${initials}</div>
            <div><div class="spk-name">${s.name}</div><div class="spk-meta">${s.num_samples} sample${s.num_samples!==1?'s':''}</div></div></div>`;
          ul.appendChild(li);
        });
      }
    } catch { $('statSpeakers').textContent = '0'; }
  </script>
</body>
</html>
